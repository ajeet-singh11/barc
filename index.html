<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARC 2026 - Test Portal</title>
    <style>
        :root {
            --primary: #ff9933;
            --secondary: #138808;
            --dark: #0a2a44;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a3a5c 0%, #051622 100%);
            color: white;
            overflow: hidden;
        }

        /* Dashboard Styles */
        #dashboard {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 153, 51, 0.5);
        }

        .subtitle { font-size: 1.2rem; margin-bottom: 40px; opacity: 0.8; }

        .btn-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        .test-btn {
            background: var(--glass);
            border: 2px solid var(--primary);
            color: white;
            padding: 20px 40px;
            font-size: 1.2rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            width: 250px;
        }

        .test-btn:hover {
            background: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 153, 51, 0.3);
        }

        /* Login Overlay */
        #login-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center; align-items: center;
        }

        .login-box {
            background: #fff;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,153,51,0.4);
        }

        .login-box h2 { color: var(--dark); margin-bottom: 25px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .login-btn {
            background: var(--dark);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Test Panel Iframe */
        #test-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000;
            background: white;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="logo">BARC SCIENTIFIC OFFICER</div>
        <div class="subtitle">Computer Science Free Mock Test Series 2026</div>
        
        <div class="btn-container">
            <button class="test-btn" onclick="openLogin('barc-exam.html')">MOCK TEST - 1</button>
            <button class="test-btn" onclick="openLogin('barc-exam1.html')">MOCK TEST - 2</button>
            <button class="test-btn" onclick="openLogin('barc-exam2.html')">MOCK TEST - 3</button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/9/90/Bhabha_Atomic_Research_Centre_Logo.png/220px-Bhabha_Atomic_Research_Centre_Logo.png" width="80" alt="BARC">
            <h2>Candidate Login</h2>
            <input type="text" id="username" placeholder="Candidate ID (e.g. BARC2026)">
            <input type="password" id="password" placeholder="Password (DOB DDMMYYYY)">
            <button class="login-btn" onclick="startTest()">Login & Start Test</button>
            <p style="font-size: 12px; color: #666; margin-top: 15px;">*Use any dummy credentials to proceed</p>
        </div>
    </div>

    <div id="test-panel">
        <iframe id="test-frame" src=""></iframe>
    </div>

    <script>
        let selectedFile = "";

        function openLogin(fileName) {
            selectedFile = fileName;
            document.getElementById('login-overlay').style.display = 'flex';
        }

        function startTest() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "" || pass === "") {
                alert("Please enter Candidate ID and Password");
                return;
            }

            // Dashboard hide and load iframe
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('test-panel').style.display = 'block';
            
            document.getElementById('test-frame').src = selectedFile;
        }
    </script>
</body>
</html>
